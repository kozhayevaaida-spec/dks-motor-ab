<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DKS Motor AB | Boka tid</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="container topbar__inner">
    <button class="icon-btn" id="menuBtn" aria-label="Öppna meny" aria-controls="drawer" aria-expanded="false">
      <span class="burger" aria-hidden="true"><span></span></span>
    </button>
   <div class="logo-area">
  <img src="logo.jpeg" alt="DKS Motor AB" class="logo">
  <div class="brand">DKS Motor AB</div>
</div>
    <a class="cta-book" href="boka.html">Boka bilservice</a>
  </div>
</header>

<div class="overlay" id="overlay" hidden></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer__header">
    <div><div class="drawer__title">Meny</div><div class="small muted">Navigera</div></div>
    <button class="icon-btn" id="closeBtn" aria-label="Stäng meny">✕</button>
  </div>
  <nav class="drawer__nav">
    <a class="drawer__link" href="index.html">Startsida</a>
    <a class="drawer__link" href="tjanster.html">Våra tjänster</a>
    <a class="drawer__link" href="kontakt.html">Kontakta oss</a>
    <a class="drawer__link is-active" href="boka.html">Boka tid</a>
    <a class="drawer__link" href="om-oss.html">Om oss</a>
  </nav>
  <div class="drawer__footer">
    <div class="small muted">Adress</div>
    <div>Hammarhagsvägen 10, 149 50 Nynäshamn</div>
  </div>
</aside>

<main class="container">
  <h1>Boka tid</h1>

  <div class="card">
    <p class="muted">
      Skicka en bokningsförfrågan via formuläret nedan, så återkommer vi så snart som möjligt.
    </p>

    <form class="booking-form" action="#" method="post" onsubmit="event.preventDefault(); alert('Tack! Din bokningsförfrågan har skickats.');">
      <label for="name">Namn</label>
      <input type="text" id="name" name="name" required>

      <label for="phone">Telefonnummer</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="email">E-post</label>
      <input type="email" id="email" name="email" required>

      <label for="service">Typ av service</label>
      <input type="text" id="service" name="service" placeholder="Exempel: AC-service, däckservice..." required>

      <label for="message">Meddelande</label>
      <textarea id="message" name="message" rows="5" placeholder="Skriv gärna registreringsnummer, önskat datum eller annan info"></textarea>

      <button type="submit" class="cta-book" style="margin-top:12px;">Skicka bokningsförfrågan</button>
    </form>
  </div>

  <div class="footer small">© DKS Motor AB</div>
</main>

<script src="script.js"></script>
</body>
</html>
