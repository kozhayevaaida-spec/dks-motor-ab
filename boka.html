<body>

<header class="topbar">
  <div class="container topbar__inner">

    <button class="icon-btn" id="menuBtn" aria-label="Öppna meny" aria-controls="drawer" aria-expanded="false">
      <span class="burger" aria-hidden="true"><span></span></span>
    </button>

    <div class="logo-area">
      <img src="logo.jpeg" alt="DKS Motor AB" class="logo">
      <div class="brand">DKS Motor AB</div>
    </div>

    <a class="cta-book" href="boka.html">Boka bilservice</a>

  </div>
</header>


<div class="overlay" id="overlay" hidden></div>

<aside class="drawer" id="drawer" aria-hidden="true">

  <div class="drawer__header">
    <div>
      <div class="drawer__title">Meny</div>
      <div class="small muted">Navigera</div>
    </div>

    <button class="icon-btn" id="closeBtn" aria-label="Stäng meny">✕</button>
  </div>

  <nav class="drawer__nav">

    <a class="drawer__link" href="index.html">Startsida</a>

  </nav>

  <div class="drawer__footer">
    <div class="small muted">Adress</div>
    <div>Hammarhagsvägen 30, 149 50 Nynäshamn</div>
  </div>

</aside>


<main class="container">

<h1>Boka bilservice</h1>

<div class="card">

<p>
Skicka en bokningsförfrågan via formuläret nedan så återkommer vi så snart som möjligt.
</p>

</div>


<div class="card">

<form
class="booking-form"
action="https://formsubmit.co/dksmotorab@gmail.com"
method="POST"
>

<input type="hidden" name="_subject" value="Ny bokningsförfrågan från hemsidan">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="https://kozhayevaaida-spec.github.io/dks-motor-ab/tack.html">

<label>Namn</label>
<input type="text" name="Namn" placeholder="Ditt namn" required>

<label>Telefon</label>
<input type="tel" name="Telefon" placeholder="Telefonnummer" required>

<label>E-post</label>
<input type="email" name="E-post" placeholder="E-postadress" required>

<label>Registreringsnummer</label>
<input type="text" name="Registreringsnummer" placeholder="Bilens registreringsnummer">

<label>Typ av service</label>
<input type="text" name="Typ av service" placeholder="t.ex. service, AC-service, däckservice">

<label>Meddelande</label>
<textarea name="Meddelande" placeholder="Beskriv vad du behöver hjälp med"></textarea>

<button type="submit" class="cta-book">Skicka bokningsförfrågan</button>

</form>

</div>


<div class="footer small">© DKS Motor AB</div>

</main>


<script src="script.js"></script>

</body>
</html>
