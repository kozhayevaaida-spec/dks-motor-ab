<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DKS Motor AB | Boka tid</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="topbar">
  <div class="container topbar__inner">

    <button class="icon-btn" id="menuBtn" aria-label="Öppna meny" aria-controls="drawer" aria-expanded="false">
      <span class="burger" aria-hidden="true"><span></span></span>
    </button>

    <div class="logo-area">
      <img src="logo.jpeg" alt="DKS Motor AB" class="logo">
      <div class="brand">DKS Motor AB</div>
    </div>

    <div class="header-actions">
      <div class="language-switcher">
        <button class="lang-btn" id="langToggle" aria-label="Byt språk">
          🌐 <span id="currentLang">SV</span>
        </button>

        <div class="lang-menu" id="langMenu">
          <button type="button" data-lang="sv">Svenska</button>
          <button type="button" data-lang="en">English</button>
          <button type="button" data-lang="es">Español</button>
          <button type="button" data-lang="ru">Русский</button>
          <button type="button" data-lang="ar">العربية</button>
          <button type="button" data-lang="zh">中文</button>
        </div>
      </div>

      <a class="cta-book" href="boka.html" data-i18n="book_service">Boka bilservice</a>
    </div>

  </div>
</header>

<div class="overlay" id="overlay" hidden></div>

<aside class="drawer" id="drawer" aria-hidden="true">

  <div class="drawer__header">
    <div>
      <div class="drawer__title" data-i18n="menu">Meny</div>
      <div class="small muted" data-i18n="navigate">Navigera</div>
    </div>

    <button class="icon-btn" id="closeBtn" aria-label="Stäng meny">✕</button>
  </div>

  <nav class="drawer__nav">
    <a class="drawer__link" href="index.html" data-i18n="home">Startsida</a>
    <a class="drawer__link" href="tjanster.html" data-i18n="services">Våra tjänster</a>
    <a class="drawer__link" href="kontakt.html" data-i18n="contact">Kontakta oss</a>
    <a class="drawer__link is-active" href="boka.html" data-i18n="book_time">Boka tid</a>
    <a class="drawer__link" href="om-oss.html" data-i18n="about">Om oss</a>
  </nav>

  <div class="drawer__footer">
    <div class="small muted" data-i18n="address_label">Adress</div>
    <div data-i18n="address_value">Hammarhagsvägen 30, 149 50 Nynäshamn</div>
  </div>

</aside>

<main class="container">

  <h1 data-i18n="booking_title">Boka bilservice</h1>

  <div class="card">
    <p data-i18n="booking_intro">
      Skicka en bokningsförfrågan via formuläret nedan så återkommer vi så snart som möjligt.
    </p>
  </div>

  <div class="card">
    <form
      class="booking-form"
      action="https://formsubmit.co/dksmotorab@gmail.com"
      method="POST"
    >

      <input type="hidden" name="_subject" value="Ny bokningsförfrågan från hemsidan">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="https://kozhayevaaida-spec.github.io/dks-motor-ab/tack.html">

      <label for="name" data-i18n="form_name_label">Namn</label>
      <input id="name" type="text" name="Namn" placeholder="Ditt namn" data-i18n-placeholder="form_name_placeholder" required>

      <label for="phone" data-i18n="form_phone_label">Telefon</label>
      <input id="phone" type="tel" name="Telefon" placeholder="Telefonnummer" data-i18n-placeholder="form_phone_placeholder" required>

      <label for="email" data-i18n="form_email_label">E-post</label>
      <input id="email" type="email" name="E-post" placeholder="E-postadress" data-i18n-placeholder="form_email_placeholder" required>

      <label for="reg" data-i18n="form_reg_label">Registreringsnummer</label>
      <input id="reg" type="text" name="Registreringsnummer" placeholder="Bilens registreringsnummer" data-i18n-placeholder="form_reg_placeholder">

      <label for="service" data-i18n="form_service_label">Typ av service</label>
      <input id="service" type="text" name="Typ av service" placeholder="t.ex. service, AC-service, däckservice" data-i18n-placeholder="form_service_placeholder">

      <label for="message" data-i18n="form_message_label">Meddelande</label>
      <textarea id="message" name="Meddelande" placeholder="Beskriv vad du behöver hjälp med" data-i18n-placeholder="form_message_placeholder"></textarea>

      <button type="submit" class="cta-book" data-i18n="form_submit">Skicka bokningsförfrågan</button>

    </form>
  </div>

  <div class="footer small">© DKS Motor AB</div>

</main>

<script src="script.js"></script>

</body>
</html>
